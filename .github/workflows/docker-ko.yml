name: Build and Publish Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install ko
        uses: ko-build/setup-ko@v0.9

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}

      - name: Build and push ko base image (Alpine + ping)
        run: |
          docker build -f Dockerfile.ko-base -t "${KO_DOCKER_REPO}:ko-base" .
          docker push "${KO_DOCKER_REPO}:ko-base"

      - name: Build and push with short SHA tag
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          export KO_DEFAULTBASEIMAGE="${KO_DOCKER_REPO}:ko-base"
          ko build --bare --platform=linux/amd64,linux/arm64 --tags "${SHORT_SHA}" .
